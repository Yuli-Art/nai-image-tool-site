<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>NAI 生圖工具</title>
    <style>
        :root {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --bg-card: #374151;
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --accent-light: rgba(124,58,237,0.15);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border: #374151;
            --border-focus: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            font-size: 14px;
        }

        /* ===== LOGIN ===== */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .login-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        #login-error {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        /* ===== COMMON FORM ===== */
        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="text"], input[type="password"],
        input[type="number"], textarea, select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 9px 12px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.15s;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--border-focus);
        }

        textarea { resize: vertical; line-height: 1.5; }

        select option { background: var(--bg-secondary); }

        input[type="number"] { -moz-appearance: textfield; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

        .form-group { margin-bottom: 12px; }
        .form-group:last-child { margin-bottom: 0; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .form-row:last-child { margin-bottom: 0; }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
        .btn-primary:disabled { background: #4b5563; cursor: not-allowed; color: #9ca3af; }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }

        .btn-full { width: 100%; }

        .btn-generate {
            padding: 13px;
            font-size: 1rem;
            letter-spacing: 0.03em;
        }

        /* ===== CHECKBOX ===== */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }

        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .checkbox-row label {
            margin-bottom: 0;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* ===== APP LAYOUT ===== */
        #app { display: none; flex-direction: column; min-height: 100vh; }

        /* Navbar */
        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 12px;
        }

        .navbar-brand {
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .anlas-info {
            text-align: right;
            line-height: 1.3;
        }

        .anlas-balance {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .anlas-balance b { color: var(--warning); }

        .anlas-cost {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .anlas-cost b { color: var(--accent); }

        .btn-logout {
            padding: 5px 12px;
            font-size: 0.78rem;
        }

        /* Main layout */
        .main-content {
            display: flex;
            flex: 1;
        }

        /* Left panel */
        .left-panel {
            width: 360px;
            min-width: 360px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Right panel */
        .right-panel {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-y: auto;
            gap: 16px;
        }

        /* Form card */
        .form-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
        }

        .card-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 12px;
        }

        /* Resolution note */
        .res-note {
            font-size: 0.75rem;
            margin-top: 4px;
        }
        .res-note.free { color: var(--success); }
        .res-note.cost { color: var(--warning); }

        /* Seed row */
        .seed-row { display: flex; gap: 6px; align-items: flex-end; }
        .seed-row input { flex: 1; }
        .seed-row .btn { padding: 9px 12px; font-size: 1rem; }

        /* Collapsible */
        .collapsible-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .collapsible-toggle .card-title { margin-bottom: 0; }

        .toggle-arrow {
            color: var(--text-secondary);
            font-size: 0.7rem;
            transition: transform 0.2s;
        }

        .toggle-arrow.open { transform: rotate(0deg); }
        .toggle-arrow.closed { transform: rotate(-90deg); }

        .collapsible-body {
            overflow: hidden;
            transition: max-height 0.25s ease, opacity 0.25s ease;
        }

        .collapsible-body.open { max-height: 1000px; opacity: 1; margin-top: 12px; }
        .collapsible-body.closed { max-height: 0; opacity: 0; }

        /* Result area */
        .result-area {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .result-placeholder {
            width: 100%;
            aspect-ratio: 5/7;
            max-height: 65vh;
            background: var(--bg-secondary);
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            gap: 10px;
        }

        .result-placeholder svg { opacity: 0.25; }
        .result-placeholder span { font-size: 0.85rem; }

        #result-image {
            display: none;
            width: 100%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .result-actions {
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Status bar */
        .status-bar {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 14px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
            display: none;
        }

        /* Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.25);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            max-width: 300px;
            animation: toastIn 0.25s ease;
            transition: opacity 0.3s;
        }

        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error   { border-color: var(--error);   color: var(--error); }
        .toast.info    { border-color: var(--info);    color: var(--info); }
        .toast.warning { border-color: var(--warning); color: var(--warning); }

        @keyframes toastIn {
            from { transform: translateX(30px); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .main-content { flex-direction: column; }

            .left-panel {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .right-panel { padding: 16px; }

            .navbar { padding: 10px 14px; }

            .anlas-info { display: none; }

            .anlas-mobile {
                font-size: 0.78rem;
                color: var(--text-secondary);
            }

            .anlas-mobile b { color: var(--warning); }
        }

        @media (min-width: 769px) {
            .anlas-mobile { display: none; }
        }
    </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-title">🎨 NAI 生圖工具</div>
        <div class="login-subtitle">
            輸入你的 NovelAI Access Token 開始使用。<br>
            Token 只存在你的裝置上，不會傳給任何第三方。
        </div>

        <div class="form-group">
            <label>Access Token</label>
            <input type="password" id="token-input" placeholder="輸入 token...">
        </div>

        <div class="checkbox-row">
            <input type="checkbox" id="remember-token" checked>
            <label for="remember-token">記住 Token（存在此裝置，下次自動登入）</label>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn btn-primary btn-full" id="login-btn" onclick="login()">登入</button>
        </div>

        <div id="login-error"></div>
    </div>
</div>


<!-- ===== MAIN APP ===== -->
<div id="app">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">🎨 NAI 生圖工具</div>
        <div class="anlas-mobile">ANLAS：<b id="anlas-mobile-val">---</b></div>
        <div class="navbar-right">
            <div class="anlas-info">
                <div class="anlas-balance">ANLAS 餘額：<b id="anlas-balance">---</b></div>
                <div class="anlas-cost" id="last-cost-row" style="display:none;">
                    上次扣點：<b id="last-cost-val">0</b> 點
                </div>
            </div>
            <button class="btn btn-secondary btn-logout" onclick="logout()">登出</button>
        </div>
    </nav>

    <!-- Main -->
    <div class="main-content">

        <!-- Left: Parameters -->
        <div class="left-panel">

            <!-- 模型 & 解析度 -->
            <div class="form-card">
                <div class="card-title">模型與解析度</div>

                <div class="form-group">
                    <label>模型 Model</label>
                    <select id="model">
                        <option value="nai-diffusion-4-5-full">NAI Diffusion V4.5 Full（最新）</option>
                        <option value="nai-diffusion-4-5">NAI Diffusion V4.5</option>
                        <option value="nai-diffusion-4">NAI Diffusion V4</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>解析度 Resolution</label>
                    <select id="resolution" onchange="updateResNote()">
                        <optgroup label="✓ 免費（Opus 方案）">
                            <option value="832x1216" selected>832×1216（直向）</option>
                            <option value="1216x832">1216×832（橫向）</option>
                            <option value="1024x1024">1024×1024（正方形）</option>
                        </optgroup>
                        <optgroup label="⚡ 消耗 ANLAS">
                            <option value="1024x1536">1024×1536（大直向）</option>
                            <option value="1536x1024">1536×1024（大橫向）</option>
                            <option value="1472x1472">1472×1472（大正方形）</option>
                            <option value="1536x640">1536×640（壁紙橫向）</option>
                            <option value="2048x1024">2048×1024（壁紙寬）</option>
                        </optgroup>
                    </select>
                    <div class="res-note free" id="res-note">✓ 免費（Opus 方案）</div>
                </div>
            </div>

            <!-- Prompt -->
            <div class="form-card">
                <div class="card-title">Prompt</div>

                <div class="form-group">
                    <label>正向 Prompt</label>
                    <textarea id="prompt" rows="5" placeholder="1girl, blue eyes, long hair, masterpiece..."></textarea>
                </div>

                <div class="form-group">
                    <label>負向 Prompt（Undesired Content）</label>
                    <textarea id="neg-prompt" rows="3" placeholder="lowres, bad anatomy, worst quality..."></textarea>
                </div>
            </div>

            <!-- 進階參數（手機預設收起） -->
            <div class="form-card">
                <div class="collapsible-toggle" onclick="toggleAdvanced()">
                    <div class="card-title">進階參數</div>
                    <span class="toggle-arrow" id="adv-arrow">▼</span>
                </div>
                <div class="collapsible-body" id="adv-body">

                    <div class="form-row">
                        <div>
                            <label>Steps</label>
                            <input type="number" id="steps" value="28" min="1" max="50">
                        </div>
                        <div>
                            <label>CFG Scale</label>
                            <input type="number" id="cfg-scale" value="5" min="1" max="10" step="0.5">
                        </div>
                    </div>

                    <div class="form-row">
                        <div>
                            <label>CFG Rescale</label>
                            <input type="number" id="cfg-rescale" value="0" min="0" max="1" step="0.01">
                        </div>
                        <div>
                            <label>Sampler</label>
                            <select id="sampler">
                                <option value="k_euler_ancestral">Euler Ancestral</option>
                                <option value="k_euler">Euler</option>
                                <option value="k_dpmpp_2s_ancestral">DPM++ 2S Ancestral</option>
                                <option value="k_dpmpp_2m_sde">DPM++ 2M SDE</option>
                                <option value="k_dpmpp_sde">DPM++ SDE</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Noise Schedule</label>
                        <select id="noise-schedule">
                            <option value="native">Native</option>
                            <option value="karras">Karras</option>
                            <option value="exponential">Exponential</option>
                            <option value="polyexponential">Polyexponential</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Seed（-1 = 隨機）</label>
                        <div class="seed-row">
                            <input type="number" id="seed" value="-1">
                            <button class="btn btn-secondary" onclick="randomSeed()" title="隨機 Seed">🎲</button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 生圖 -->
            <button class="btn btn-primary btn-full btn-generate" id="generate-btn" onclick="generateImage()">
                生圖
            </button>

        </div>

        <!-- Right: Result -->
        <div class="right-panel">
            <div class="result-area">

                <div id="result-placeholder" class="result-placeholder">
                    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                        <rect x="3" y="3" width="18" height="18" rx="2.5"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span>生成的圖片會顯示在這裡</span>
                </div>

                <img id="result-image" alt="生成結果">

                <div id="status-bar" class="status-bar"></div>

                <div id="result-actions" class="result-actions">
                    <button class="btn btn-primary" onclick="downloadImage()">⬇ 下載圖片</button>
                    <button class="btn btn-secondary" onclick="copyPrompt()">📋 複製 Prompt</button>
                </div>

            </div>
        </div>

    </div>
</div>

<div id="toast-container"></div>

<!-- msgpack for decoding NAI API response -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/msgpack-lite/0.1.26/msgpack.min.js"></script>

<script>
'use strict';

// ===========================
// STATE
// ===========================
let apiToken = '';
let anlasBalance = null;
let lastBlob = null;
let lastPromptText = '';
let isGenerating = false;
const FREE_RES = new Set(['832x1216', '1216x832', '1024x1024']);

// ===========================
// INIT
// ===========================
window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('nai_token');
    if (saved) {
        apiToken = saved;
        showApp();
    }

    // Advanced panel: open on desktop, closed on mobile
    const isMobile = window.innerWidth <= 768;
    setAdvanced(!isMobile);

    // Enter key to login
    document.getElementById('token-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
});

// ===========================
// LOGIN / LOGOUT
// ===========================
async function login() {
    const raw = document.getElementById('token-input').value.trim();
    if (!raw) { showLoginErr('請輸入 Token'); return; }

    // 移除使用者不小心帶上的 "Bearer " 前綴
    apiToken = raw.replace(/^Bearer\s+/i, '');

    // 簡單檢查格式（NAI token 是很長的 JWT 字串）
    if (apiToken.length < 20) {
        showLoginErr('Token 格式不正確，請確認是否複製完整');
        return;
    }

    if (document.getElementById('remember-token').checked) {
        localStorage.setItem('nai_token', apiToken);
    }

    showApp();

    // 背景靜默查詢 ANLAS（失敗不影響使用）
    fetchAnlasSilent();
}

function logout() {
    localStorage.removeItem('nai_token');
    apiToken = ''; anlasBalance = null; lastBlob = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('token-input').value = '';
    document.getElementById('login-error').style.display = 'none';
}

function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'flex';
}

function showLoginErr(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.style.display = 'block';
}

// ===========================
// ANLAS
// ===========================
async function fetchAnlas() {
    const res = await fetch('https://api.novelai.net/user/subscription', {
        headers: { 'Authorization': `Bearer ${apiToken}` },
        signal: AbortSignal.timeout(10000)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const fixed = data.trainingStepsLeft?.fixedTrainingStepsLeft || 0;
    const purchased = data.trainingStepsLeft?.purchasedTrainingSteps || 0;
    anlasBalance = fixed + purchased;

    const formatted = anlasBalance.toLocaleString();
    document.getElementById('anlas-balance').textContent = formatted;
    document.getElementById('anlas-mobile-val').textContent = formatted;

    return anlasBalance;
}

// 靜默查詢 ANLAS，失敗顯示 N/A，不中斷主流程
async function fetchAnlasSilent() {
    try {
        await fetchAnlas();
    } catch(e) {
        // CORS 或其他原因失敗，顯示 N/A
        document.getElementById('anlas-balance').textContent = 'N/A';
        document.getElementById('anlas-mobile-val').textContent = 'N/A';
    }
}

function showCost(cost) {
    if (cost <= 0) return;
    document.getElementById('last-cost-val').textContent = cost;
    document.getElementById('last-cost-row').style.display = 'block';
}

// ===========================
// UI HELPERS
// ===========================
function updateResNote() {
    const val = document.getElementById('resolution').value;
    const note = document.getElementById('res-note');
    if (FREE_RES.has(val)) {
        note.textContent = '✓ 免費（Opus 方案）';
        note.className = 'res-note free';
    } else {
        note.textContent = '⚡ 消耗 ANLAS';
        note.className = 'res-note cost';
    }
}

let advOpen = true;
function setAdvanced(open) {
    advOpen = open;
    const body = document.getElementById('adv-body');
    const arrow = document.getElementById('adv-arrow');
    body.className = 'collapsible-body ' + (open ? 'open' : 'closed');
    arrow.className = 'toggle-arrow ' + (open ? 'open' : 'closed');
}

function toggleAdvanced() { setAdvanced(!advOpen); }

function randomSeed() {
    document.getElementById('seed').value = Math.floor(Math.random() * 9999999999);
}

function showStatus(msg) {
    const bar = document.getElementById('status-bar');
    bar.textContent = msg;
    bar.style.display = 'block';
}

function hideStatus() {
    document.getElementById('status-bar').style.display = 'none';
}

function setGenerating(active) {
    isGenerating = active;
    const btn = document.getElementById('generate-btn');
    btn.disabled = active;
    btn.innerHTML = active ? '<span class="spinner"></span> 生成中...' : '生圖';
}

// ===========================
// GENERATE
// ===========================
async function generateImage() {
    if (isGenerating) return;

    const prompt = document.getElementById('prompt').value.trim();
    if (!prompt) { toast('請輸入正向 Prompt', 'error'); return; }

    setGenerating(true);
    lastPromptText = prompt;

    const negPrompt = document.getElementById('neg-prompt').value.trim();
    const [width, height] = document.getElementById('resolution').value.split('x').map(Number);
    const model = document.getElementById('model').value;
    const steps = parseInt(document.getElementById('steps').value) || 28;
    const scale = parseFloat(document.getElementById('cfg-scale').value) || 5;
    const cfgRescale = parseFloat(document.getElementById('cfg-rescale').value) || 0;
    const sampler = document.getElementById('sampler').value;
    const noiseSchedule = document.getElementById('noise-schedule').value;
    let seed = parseInt(document.getElementById('seed').value);
    if (isNaN(seed) || seed < 0) seed = Math.floor(Math.random() * 9999999999);

    const isV4 = model.startsWith('nai-diffusion-4');

    const parameters = {
        width, height, scale,
        sampler, steps,
        n_samples: 1,
        ucPreset: 0,
        qualityToggle: true,
        dynamic_thresholding: false,
        controlnet_strength: 1,
        legacy: false,
        add_original_image: false,
        cfg_rescale: cfgRescale,
        noise_schedule: noiseSchedule,
        legacy_v3_extend: false,
        seed,
        negative_prompt: negPrompt
    };

    // V4/V4.5 需要額外的 v4_prompt 欄位
    if (isV4) {
        parameters.v4_prompt = {
            caption: {
                base_caption: prompt,
                char_captions: []
            },
            use_coords: false,
            use_order: false
        };
        parameters.v4_negative_prompt = {
            caption: {
                base_caption: negPrompt,
                char_captions: []
            },
            use_coords: false,
            use_order: false
        };
    } else {
        // V3 用 sm/sm_dyn
        parameters.sm = false;
        parameters.sm_dyn = false;
    }

    const body = {
        input: prompt,
        model: model,
        action: 'generate',
        parameters
    };

    // Record ANLAS before
    const beforeAnlas = anlasBalance;

    // Fetch with retry
    const TIMEOUT_MS = 120000;
    const MAX_RETRY = 2;
    let resp = null;

    for (let attempt = 0; attempt <= MAX_RETRY; attempt++) {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), TIMEOUT_MS);

        try {
            showStatus(attempt > 0 ? `重試中（第 ${attempt} 次）...` : '正在生成，請稍候...');

            resp = await fetch('https://image.novelai.net/ai/generate-image', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiToken}`,
                    'Accept': 'application/x-msgpack'
                },
                body: JSON.stringify(body),
                signal: ctrl.signal
            });

            clearTimeout(tid);

            // Retry on rate limit or server error
            if ((resp.status === 429 || (resp.status >= 500 && resp.status <= 599)) && attempt < MAX_RETRY) {
                const wait = resp.status === 429 ? 3000 * (attempt + 1) : 1500 * (attempt + 1);
                const label = resp.status === 429 ? '請求過於頻繁' : `伺服器錯誤 ${resp.status}`;
                toast(`${label}，${Math.ceil(wait/1000)} 秒後重試`, 'warning');
                await sleep(wait);
                continue;
            }

            break;

        } catch(e) {
            clearTimeout(tid);
            if (attempt < MAX_RETRY) {
                toast('網路錯誤，重試中...', 'warning');
                await sleep(1500 * (attempt + 1));
                continue;
            }
            const isTimeout = e.name === 'AbortError';
            toast(isTimeout ? '請求逾時（120秒）' : '網路錯誤：' + e.message, 'error');
            setGenerating(false);
            hideStatus();
            return;
        }
    }

    if (!resp || !resp.ok) {
        toast(`生圖失敗：HTTP ${resp?.status || '未知'}`, 'error');
        setGenerating(false);
        hideStatus();
        return;
    }

    // Decode msgpack response
    try {
        showStatus('處理圖片中...');
        const buf = await resp.arrayBuffer();
        const decoded = msgpack.decode(new Uint8Array(buf));

        // 偵錯：把實際收到的 key 顯示出來
        console.log('NAI response keys:', Object.keys(decoded || {}));
        console.log('NAI response:', decoded);

        if (!decoded?.output?.length) throw new Error('回應格式不正確，keys: ' + JSON.stringify(Object.keys(decoded || {})));

        const imgBytes = decoded.output[0];
        const blob = new Blob([imgBytes], { type: 'image/png' });
        lastBlob = blob;

        const url = URL.createObjectURL(blob);

        // Show result
        document.getElementById('result-placeholder').style.display = 'none';
        const img = document.getElementById('result-image');
        img.src = url;
        img.style.display = 'block';
        document.getElementById('result-actions').style.display = 'flex';

        // Update seed shown
        document.getElementById('seed').value = seed;

        // Calc cost（靜默，失敗不影響）
        try {
            const afterAnlas = await fetchAnlas();
            if (beforeAnlas !== null && beforeAnlas !== anlasBalance) {
                showCost(beforeAnlas - afterAnlas);
            }
        } catch(_) {}

        toast('生圖完成！', 'success');

    } catch(e) {
        toast('解析圖片失敗：' + e.message, 'error');
    }

    setGenerating(false);
    hideStatus();
}

// ===========================
// DOWNLOAD
// ===========================
function downloadImage() {
    if (!lastBlob) return;
    const url = URL.createObjectURL(lastBlob);
    const a = document.createElement('a');
    a.href = url;
    const ts = new Date().toISOString().slice(0,19).replace(/[T:]/g, '-');
    const seed = document.getElementById('seed').value;
    a.download = `nai_${ts}_seed${seed}.png`;
    a.click();
    URL.revokeObjectURL(url);
}

// ===========================
// COPY PROMPT
// ===========================
function copyPrompt() {
    if (!lastPromptText) return;
    navigator.clipboard.writeText(lastPromptText)
        .then(() => toast('Prompt 已複製', 'success'))
        .catch(() => toast('複製失敗，請手動複製', 'error'));
}

// ===========================
// TOAST
// ===========================
function toast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
    }, 3500);
}

// ===========================
// UTILS
// ===========================
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

</script>
</body>
</html>
